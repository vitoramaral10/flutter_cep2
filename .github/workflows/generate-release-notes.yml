name: Generate Release Notes

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version for release notes (e.g., 1.0.2)'
        required: true
        type: string

permissions:
  contents: read

jobs:
  generate-notes:
    runs-on: ubuntu-latest
    name: Generate Release Notes

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate version format
        run: |
          VERSION="${{ inputs.version }}"
          if ! [[ $VERSION =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "❌ Invalid version format: $VERSION"
            echo "Expected format: X.Y.Z (semantic versioning)"
            exit 1
          fi
          echo "✅ Version format is valid: $VERSION"

      - name: Generate release notes
        run: |
          chmod +x scripts/generate-release-notes.sh
          bash scripts/generate-release-notes.sh "${{ inputs.version }}"

      - name: Upload release notes artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: RELEASE_NOTES_*.md
          retention-days: 30

      - name: Create summary
        run: |
          echo "## 📝 Release Notes Generated" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ inputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Date:** $(date +%Y-%m-%d)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Release notes have been generated and are available as artifacts." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Preview" >> $GITHUB_STEP_SUMMARY
          echo '```markdown' >> $GITHUB_STEP_SUMMARY
          cat "RELEASE_NOTES_${{ inputs.version }}.md" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
