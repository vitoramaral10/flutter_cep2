name: Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Get dependencies
        run: dart pub get

      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze code
        run: dart analyze --fatal-infos

      - name: Run tests with coverage
        run: dart test --coverage=coverage

      - name: Format coverage
        run: |
          dart pub global activate coverage
          dart pub global run coverage:format_coverage \
            --lcov --in=coverage --out=coverage/lcov.info \
            --report-on=lib

      - name: Check coverage threshold
        if: github.event_name == 'pull_request'
        run: |
          sudo apt-get update -qq && sudo apt-get install -y lcov > /dev/null
          coverage_percent=$(lcov --summary coverage/lcov.info 2>/dev/null \
            | grep "lines" | awk '{print $2}' | sed 's/%//')
          coverage_percent=${coverage_percent:-0}
          coverage_int=${coverage_percent%.*}
          echo "Coverage: ${coverage_percent}%"
          if [ "$coverage_int" -lt 80 ]; then
            echo "::error::Coverage ${coverage_percent}% is below 80% threshold"
            exit 1
          fi

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/lcov.info
          fail_ci_if_error: false

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/lcov.info
          retention-days: 30
