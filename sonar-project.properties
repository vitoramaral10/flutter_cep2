# SonarCloud Project Configuration

sonar.organization=vitoramaral10
sonar.projectKey=vitoramaral10_flutter_cep2
sonar.projectName=flutter_cep2
sonar.projectVersion=1.0.2

# Source code directory
sonar.sources=lib
sonar.tests=test

# Coverage reports
sonar.dart.lcov.reportPaths=coverage/lcov.info

# Excluded files
sonar.exclusions=**/*.g.dart,**/*.freezed.dart,**/*.config.dart

# Test files
sonar.test.inclusions=test/**/*_test.dart

# Performance
sonar.projectBaseDir=.

# Language
sonar.language=dart

# Encoding
sonar.sourceEncoding=UTF-8

# Code Quality Rules
sonar.dart.analysis.reportPath=analysis-result.json
